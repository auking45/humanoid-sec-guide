site_name: Humanoid Security Guide (HSG)
site_description: Technical Security Specification for High-End Humanoid Robots based on the KISA 2025 Model.
site_author: Jinha
site_url: https://auking45.github.io/humanoid-sec-guide/

# UI/UX Theme Configuration
theme:
  name: material
  language: en
  palette:
    - scheme: slate # Dark mode for a professional security look
      primary: indigo
      accent: blue
  features:
    - navigation.sections # Organize sidebar into sections
    - content.code.copy # Add copy button to code blocks

# Navigation Structure (Aligned with KISA 4-domain model)
nav:
  - Home: index.md
  - Security Threats: threat_model.md
  - Security Solutions: security_solutions.md
  - 1. Hardware Security:
      - Requirements: hardware/requirements.md
      - Specific Requirements: hardware/specific_requirements.md
  - 2. Network Security:
      - Requirements: network/requirements.md
      - Specific Requirements: network/specific_requirements.md
  - 3. System SW Security:
      - Requirements: system/requirements.md
      - Specific Requirements: system/specific_requirements.md
  - 4. Application Security:
      - Requirements: app/requirements.md
      - Specific Requirements: app/specific_requirements.md
  - Industrial Robot Security:
      - Overview: industrial/overview.md
      - Robot Control Panel: industrial/control_panel.md
      - Teaching Tool: industrial/teaching_tool.md
      - Robot Body: industrial/robot_body.md
  - Compliance Checklist:
      - Overview: checklist.md
      - 1. SSDF: checklist/ssdf.md
      - 2. Supply Chain: checklist/supply_chain.md
      - 3. Identification & Auth: checklist/ia.md
      - 4. Use Control: checklist/uc.md
      - 5. System Integrity: checklist/si.md
      - 6. Data Protection: checklist/dp.md
      - 7. Data Flow Restriction: checklist/dfr.md
      - 8. Event Response: checklist/er.md
      - 9. Resource Availability: checklist/ra.md
      - 10. Cyber Resilience: checklist/cr.md
      - 11. Wireless Security: checklist/ws.md

# Plugins Configuration
plugins:
  - search
  - autorefs
  - glightbox
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
        - locale: ko
          name: 한국어
          nav_translations:
            Home: 홈
            Security Threats: 보안 위협
            Security Solutions: 보안 솔루션
            1. Hardware Security: 1. 하드웨어 보안
            Requirements: 보안 요구사항
            Specific Requirements: 휴머노이드 특화 보안 요구사항
            2. Network Security: 2. 네트워크 보안
            3. System SW Security: 3. 시스템 SW 보안
            4. Application Security: 4. 애플리케이션 보안
            Compliance Checklist: 컴플라이언스 체크리스트
            Industrial Robot Security: 산업용 로봇 보안
            Robot Control Panel: 로봇 제어반
            Teaching Tool: 티칭 도구
            Robot Body: 로봇 본체
            "1. SSDF": "1. SSDF"
            "2. Supply Chain": "2. 공급망 보안"
            "3. Identification & Auth": "3. 식별 및 인증"
            "4. Use Control": "4. 사용 통제"
            "5. System Integrity": "5. 시스템 무결성"
            "6. Data Protection": "6. 데이터 보호"
            "7. Data Flow Restriction": "7. 데이터 흐름 제한"
            "8. Event Response": "8. 이벤트 대응"
            "9. Resource Availability": "9. 자원 가용성"
            "10. Cyber Resilience": "10. 사이버 복원력"
            "11. Wireless Security": "11. 무선 보안"

# Markdown Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
